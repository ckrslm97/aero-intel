name: Daily edition + PDF

# Once a day: assemble the day's edition, render it to a PDF with Playwright's
# Chromium, and store the PDF in Postgres (Vercel has no Chromium and a
# read-only disk, so the runner produces the PDF and the API serves it from the
# DB). If SMTP secrets are configured, also send the newsletter.
on:
  schedule:
    # Not one alarm clock -- a series of knocks. GitHub queues scheduled
    # workflows and, measured on this repo over four days, fired a 04:15 UTC
    # schedule at 06:15, 06:41, 07:25 and 06:38: an average delay of 2h30m.
    # No single cron entry can therefore deliver "every morning at nine".
    # These fire through the small hours; each run asks
    # app/services/delivery_window.py whether the send window (09:00 Istanbul
    # = 06:00 UTC) is open, and only the first one inside it sends. Sending is
    # idempotent, so the extra runs cost a few seconds and nothing else.
    - cron: "0 3 * * *"
    - cron: "30 4 * * *"
    - cron: "0 6 * * *"
    - cron: "20 6 * * *"
    - cron: "40 6 * * *"
    - cron: "0 7 * * *"
    - cron: "30 7 * * *"
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jobs-daily-edition
  cancel-in-progress: false

jobs:
  daily-edition:
    runs-on: ubuntu-latest
    # SMTP at job level so the send step's `if` can read env.SMTP_HOST reliably
    # (step-level env is not guaranteed to be visible in that same step's `if`).
    # Env var names must match the pydantic Settings fields (app/core/config.py):
    # smtp_username / email_from, not SMTP_USER / SMTP_FROM.
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          # Playwright lives in the dev requirements; the edition PDF is the one
          # job that needs it.
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Chromium is large; cache it across runs keyed on the Playwright version.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/requirements-dev.txt') }}

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Build edition + render PDF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_PROVIDER: openai_compat
          LLM_BASE_URL: https://api.groq.com/openai/v1
          LLM_MODEL: llama-3.3-70b-versatile
          LLM_MODEL_FAST: llama-3.1-8b-instant
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # daily-if-due sends the newsletter itself, so the link target has to
          # be here: without it the runner has no CORS origin to infer from and
          # every link in the email falls back to localhost.
          PUBLIC_SITE_URL: https://aero-intel-3qt1.vercel.app
        run: |
          alembic upgrade head
          # Decides for itself whether it is time; assembles the edition either
          # way so the send, when it comes, is instant.
          python -m app.cli daily-if-due
          python -m app.cli refresh-pdf
          # One 70b call/day: the Turkish "pattern of the day" for /insights.
          python -m app.cli build-insight
