name: Daily edition + PDF

# Once a day: assemble the day's edition, render it to a PDF with Playwright's
# Chromium, and store the PDF in Postgres (Vercel has no Chromium and a
# read-only disk, so the runner produces the PDF and the API serves it from the
# DB). If SMTP secrets are configured, also send the newsletter.
on:
  schedule:
    # Not one alarm clock -- a series of knocks. GitHub queues scheduled
    # workflows; every entry below fires late, and by a different amount each
    # day. Measured on this repo on 22 Jul (scheduled -> actually started):
    #   03:00 -> 05:45 (2h46)   06:40 -> 09:14 (2h34)
    #   04:30 -> 07:08 (2h38)   07:00 -> 09:26 (2h26)
    #   06:00 -> 08:03 (2h03)   07:30 -> 09:55 (2h25)
    #   06:20 -> 08:47 (2h27)   08:15 -> 10:34 (2h19)
    # No single cron entry can therefore deliver "every morning at nine".
    # Each run asks app/services/delivery_window.py whether the send window
    # (09:00 Istanbul = 06:00 UTC) is open; only the first one inside it sends,
    # and sending is idempotent, so the extra runs cost nothing.
    #
    # The first version of this list left a 1h22m hole: the 03:00 entry landed
    # at 08:45 Istanbul -- fifteen minutes too early to send -- and the next
    # arrival was 10:07, so the mail went out at 10:08 instead of just after
    # nine. With the delay running 2h03-2h46, an *arrival* in 06:00-06:40 UTC
    # needs a *schedule* somewhere in 03:15-04:30, so that band is now covered
    # every quarter hour. Whatever the queue does on a given day, one of these
    # lands in the window.
    - cron: "0 3 * * *"
    - cron: "15 3 * * *"
    - cron: "30 3 * * *"
    - cron: "45 3 * * *"
    - cron: "0 4 * * *"
    - cron: "15 4 * * *"
    - cron: "30 4 * * *"
    # Backstops, in case the queue is fast that morning and every entry above
    # arrives before nine.
    - cron: "0 6 * * *"
    - cron: "20 6 * * *"
    - cron: "40 6 * * *"
    - cron: "0 7 * * *"
    - cron: "30 7 * * *"
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jobs-daily-edition
  cancel-in-progress: false

jobs:
  daily-edition:
    runs-on: ubuntu-latest
    # SMTP at job level so the send step's `if` can read env.SMTP_HOST reliably
    # (step-level env is not guaranteed to be visible in that same step's `if`).
    # Env var names must match the pydantic Settings fields (app/core/config.py):
    # smtp_username / email_from, not SMTP_USER / SMTP_FROM.
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
    defaults:
      run:
        working-directory: backend
    steps:
      # Thirteen knocks a day, but only the ones that arrive after 09:00
      # Istanbul can possibly send. Answering that with `date` costs two
      # seconds; letting the run reach `daily-if-due` costs four minutes of
      # pip install and a Chromium download first. Manual dispatches skip the
      # gate -- if a human asked for an edition, they want it now.
      - name: Is the send window open?
        id: gate
        run: |
          hour=$(TZ=Europe/Istanbul date +%-H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$hour" -ge 9 ]; then
            echo "due=true" >> "$GITHUB_OUTPUT"
          else
            echo "due=false" >> "$GITHUB_OUTPUT"
            echo "Istanbul time is ${hour}:xx -- too early, stopping here."
          fi
        working-directory: .

      - uses: actions/checkout@v4
        if: steps.gate.outputs.due == 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.due == 'true'
        with:
          python-version: "3.11"
          cache: "pip"
          # Playwright lives in the dev requirements; the edition PDF is the one
          # job that needs it.
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        if: steps.gate.outputs.due == 'true'
        run: pip install -r requirements-dev.txt

      # Chromium is large; cache it across runs keyed on the Playwright version.
      - name: Cache Playwright browsers
        if: steps.gate.outputs.due == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/requirements-dev.txt') }}

      - name: Install Chromium
        if: steps.gate.outputs.due == 'true'
        run: playwright install --with-deps chromium

      - name: Build edition + render PDF
        if: steps.gate.outputs.due == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_PROVIDER: openai_compat
          LLM_BASE_URL: https://api.groq.com/openai/v1
          LLM_MODEL: llama-3.3-70b-versatile
          LLM_MODEL_FAST: llama-3.1-8b-instant
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # daily-if-due sends the newsletter itself, so the link target has to
          # be here: without it the runner has no CORS origin to infer from and
          # every link in the email falls back to localhost.
          PUBLIC_SITE_URL: https://aero-intel-3qt1.vercel.app
        run: |
          alembic upgrade head
          # Decides for itself whether it is time; assembles the edition either
          # way so the send, when it comes, is instant.
          python -m app.cli daily-if-due
          python -m app.cli refresh-pdf
          # One 70b call/day: the Turkish "pattern of the day" for /insights.
          python -m app.cli build-insight
