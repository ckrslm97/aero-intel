name: KPIs

# Refresh the KPI dashboard from live market/aviation sources. Cheap and
# fast (no LLM), so it runs often. GitHub's scheduler is best-effort -- on a
# free public repo a */15 tick can be skipped or delayed under load, so treat
# 15 minutes as a target, not a guarantee.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Never let two refreshes overlap and double-write observations.
  group: jobs-kpis
  cancel-in-progress: false

jobs:
  refresh-kpis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Migrate + refresh KPIs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic upgrade head
          python -m app.cli refresh-kpis
