name: News ingest + enrich

# Ingest RSS, dedup, and enrich (categorise + real Turkish translation) via
# Groq. Enrichment is capped per run (LLM_ENRICH_BATCH_SIZE) so a single run
# can't drain Groq's free daily budget: 12 runs/day x 12 articles = ~140/day,
# which is the ceiling the model split (8b classify / 70b translate) affords.
# The backlog is worked off over subsequent runs.
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jobs-news
  cancel-in-progress: false

jobs:
  full-cycle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest + dedup + enrich (Groq)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_PROVIDER: openai_compat
          LLM_BASE_URL: https://api.groq.com/openai/v1
          LLM_MODEL: llama-3.3-70b-versatile
          LLM_MODEL_FAST: llama-3.1-8b-instant
          # Raised from 12: the relevance gate (app/pipeline/relevance.py) keeps
          # low-signal articles off the LLM entirely, and translation now costs
          # one call instead of two, so the same token budget covers more.
          LLM_ENRICH_BATCH_SIZE: "24"
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          alembic upgrade head
          python -m app.cli full-cycle
          # Articles enriched before a translator was configured (or skipped by
          # the gate on a busy day) had no automatic drain at all -- the command
          # existed but ran only on manual dispatch.
          python -m app.cli translate-backlog --limit 8
