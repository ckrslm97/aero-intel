apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aerointel-ingress
  namespace: aerointel
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: aerointel.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aerointel-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aerointel-frontend
                port:
                  number: 3000
