# Placeholder values -- replace before applying, or generate with:
#   kubectl create secret generic aerointel-secrets -n aerointel \
#     --from-literal=database-url=postgresql+asyncpg://... \
#     --from-literal=secret-key=$(openssl rand -hex 32)
apiVersion: v1
kind: Secret
metadata:
  name: aerointel-secrets
  namespace: aerointel
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://user:password@managed-postgres-host:5432/aerointel"
  redis-url: "redis://managed-redis-host:6379/0"
  secret-key: "replace-with-a-long-random-string"
  smtp-host: ""
  smtp-username: ""
  smtp-password: ""
  llm-api-key: ""
