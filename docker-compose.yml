services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aerointel
      POSTGRES_USER: aerointel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aerointel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerointel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Not started by default (`docker compose up`) -- the app runs on Postgres
  # full-text search until article volume genuinely needs this. Bring it up
  # explicitly with: docker compose --profile search up
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    profiles: ["search"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aerointel:${POSTGRES_PASSWORD:-aerointel}@postgres:5432/aerointel
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost"]'
      LLM_PROVIDER: ${LLM_PROVIDER:-heuristic}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-newsroom@aerointel.local}
      STORAGE_LOCAL_DIR: /data/storage
      OUTBOX_DIR: /data/outbox
    volumes:
      - storage_data:/data/storage
      - outbox_data:/data/outbox
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  storage_data:
  outbox_data:
